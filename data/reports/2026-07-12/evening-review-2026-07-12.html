  <h2>四、调仓建议（风险与应对） <span class="tg">▾</span></h2>
  <div class="sec-body"><div class="reb pr-中">
      <div class="reb-t">● 半导体是否继续持有 <span class="pbadge p-中">中优先</span></div>
      <div class="reb-d">半导体系占总资产65.4%、占持仓74.5%，07-10单日-6.26%被抽血最重（还债期）；但周末海外存储/AI强催化(SK海力士+10~13%/英伟达破5万亿)提供潜在托底，A股半导体情绪由42微修复至45。</div><div class="reb-s">➤ 建议：倾向扛（严守-8%硬止损）：属获利回吐非基本面恶化，且获周末外部催化。周一若存储催化带动高开冲高→趁反弹锁利降至占总资产≤60%、不追高；若低开放量下破MA20→触发减仓。核心纪律：反弹是减仓良机而非加仓理由。</div></div><div class="reb pr-中">
      <div class="reb-t">● 加入商业航天/医药到 watchlist <span class="pbadge p-中">中优先</span></div>
      <div class="reb-d">账户尚无商业航天/创新药暴露，而二者成新主线（军工航天+10.2%、港股创新药+3.25%），经周末冷却待周一验证延续性。</div><div class="reb-s">➤ 建议：将 航天ETF / 卫星ETF / 创新药ETF / 消费ETF 加入 watchlist；周一确认『高开不回落+资金沉淀』后，用半导体止盈回款小仓试建（单笔≤总仓15%）。</div></div><div class="reb pr-高">
      <div class="reb-t">● 高集中度 <span class="pbadge p-高">高优先</span></div>
      <div class="reb-d">前二持仓（东方阿尔法+东方AI）合计约56.6%，东方阿尔法29.1%逼近30%单基上限。</div><div class="reb-s">➤ 建议：东方阿尔法反弹即减至≤25%；用回款分散至防御/低位轮动，降低单一赛道波动。</div></div><div class="reb pr-高">
      <div class="reb-t">● 高风险管理 <span class="pbadge p-高">高优先</span></div>
      <div class="reb-d">永赢半导绝对敞口1856元、港药持续亏损；科技短线退潮但情绪中性、周末存储催化边际改善。</div><div class="reb-s">➤ 建议：永赢触-2%止损50%；港药按两级阈值（-5%减半/-1%内减1/3）；保留鹏华债/纳指防御底仓。</div></div><div class="reb pr-中">
      <div class="reb-t">● 现金弹药管理 <span class="pbadge p-中">中优先</span></div>
      <div class="reb-d">现金1589元(12.11%)为下周急跌低吸弹药，勿闲置；调仓资金全部来自止盈回款不新增投入。</div><div class="reb-s">➤ 建议：分3-4批、每周一批执行再平衡；单日板块涨跌超3%暂停，避免追涨杀跌。</div></div>
